<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>stretchfm – Coming Soon</title>

  <style>
    body {
      margin: 0;
      color: #111;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* 🎬 Background Video */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    
      filter: grayscale(100%) contrast(1.1) brightness(1.15);
    }

    /* 🎨 Overlay */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        opacity: 0.28;
        z-index: -1;
      }

    /* ✨ Container */
    .wrap {
      text-align: center;
      padding: 30px 20px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1.4s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 🎬 Logo Animation */
    @keyframes logoReveal {
      0% {
        opacity: 0;
        transform: scale(0.97) translateY(15px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    img {
      max-width: 700px;
      width: 90%;
      height: auto;
      display: block;
      margin: 0 auto 35px;
    
      opacity: 0;
      animation: logoReveal 2.2s ease forwards;
      animation-delay: 0.2s;
    
      filter: 
        brightness(1.4)
        contrast(1.2)
        drop-shadow(0 0 20px rgba(255,255,255,0.15))
        drop-shadow(0 10px 30px rgba(0,0,0,0.25));
    }  

    /* 🔗 Links Container */
    .links {
      display: flex;
      gap: 28px;
      justify-content: center;
      align-items: center;

      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
      animation-delay: 0.9s;
    }

    /* 🔗 Icons */
    .links a {
      color: #fff; /* WICHTIG: weiß wegen dunklem Overlay */
      display: inline-flex;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .links a:hover {
      transform: scale(1.25) translateY(-3px);
      opacity: 0.7;
    }

    .links svg {
      width: 34px;
      height: 34px;
    }

  </style>
</head>
