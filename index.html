<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>stretchfm – Coming Soon</title>

  <style>
    body {
      margin: 0;
      color: #111;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* 🎬 Background Video */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: grayscale(100%) contrast(1.1);
    }

    /* 🎨 Overlay für Lesbarkeit */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0.75;
      z-index: -1;
    }

    /* ✨ Content Fade-In (langsamer & smoother) */
    .wrap {
      text-align: center;
      padding: 30px 20px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1.6s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    img {
      max-width: 700px;
      width: 90%;
      height: auto;
      display: block;
      margin: 0 auto 35px;
    }

    .links {
      display: flex;
      gap: 28px;
      justify-content: center;
      align-items: center;
    }

    .links a {
      color: #111;
      display: inline-flex;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .links a:hover {
      transform: scale(1.25) translateY(-3px);
      opacity: 0.7;
    }

    .links svg {
      width: 34px;
      height: 34px;
    }

  </style>
</head>

<body>

  <!-- 🎬 Background Video -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="video.mp4" type="video/mp4">
  </video>

  <div class="wrap">

    <img src="bild.png" alt="Stretch FM Coming Soon">

    <div class="links">

      <!-- 📧 Mail -->
      <a href="mailto:beschwerden@stretchfm.de">
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
          <path d="M2 4h20v16H2V4zm2 2v.511l8 5.334 8-5.334V6H4zm16 
          2.489l-8 5.334-8-5.334V18h16V8.489z"/>
        </svg>
      </a>

      <!-- 📸 Instagram -->
      <a href="https://instagram.com/stretch__fm" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
          <path d="M7 2C4.243 2 2 4.243 2 7v10c0 2.757 2.243 5 5 
          5h10c2.757 0 5-2.243 5-5V7c0-2.757-2.243-5-5-5H7zm10 
          2c1.654 0 3 1.346 3 3v10c0 1.654-1.346 
          3-3 3H7c-1.654 0-3-1.346-3-3V7c0-1.654 
          1.346-3 3-3h10zm-5 3a5 5 0 100 
          10 5 5 0 000-10zm0 2a3 3 0 110 
          6 3 3 0 010-6zm4.5-2.5a1 
          1 0 100 2 1 1 0 000-2z"/>
        </svg>
      </a>

    </div>

  </div>
</body>
</html>
